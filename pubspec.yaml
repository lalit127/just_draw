name: kitchen_design_app
description: AI-Powered Kitchen Design & Quotation App for Contractors

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Fonts & UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  dotted_border: ^2.1.0

  # Image picking
  image_picker: ^1.1.2

  # Networking
  dio: ^5.9.2

  # Environment variables
  flutter_dotenv: ^5.1.0

  # Sharing / Export
  share_plus: ^9.0.0
  path_provider: ^2.1.3

  # Formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env