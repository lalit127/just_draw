name: just_draw
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
 
  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
 
  # HTTP client
  dio: ^5.4.3+1
 
  # Image picking
  image_picker: ^1.1.2
 
  # Permissions
  permission_handler: ^11.3.1
 
  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  dotted_border: ^2.1.0
 
  # Utils
  path_provider: ^2.1.3
  mime: ^1.0.5
  flutter_dotenv: ^5.1.0
 
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.9
 
flutter:
  uses-material-design: true
  assets:
    - assets/
    - .env
